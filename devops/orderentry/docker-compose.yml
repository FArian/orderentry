volumes:
  pgdata:
  pgadmin-data:
  grafana-data:
  prometheus-data:

networks:
  orderentry-orc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.128.0/24

services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=orderentry-orc-net"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./data/traefik/letsencrypt:/letsencrypt"

    networks:
      - orderentry-orc-net

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - orderentry-orc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./data/pgadmin/config/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orderentry-orc-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=orderentry-orc-net"
      - "traefik.http.routers.pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=le"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  hapi:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir
    restart: always
    volumes:
      - ./data/hapi/config:/data
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/data/
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orderentry-orc-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=orderentry-orc-net"
      - "traefik.http.routers.hapi.rule=Host(`${HAPI_DOMAIN}`)"
      - "traefik.http.routers.hapi.entrypoints=websecure"
      - "traefik.http.routers.hapi.tls.certresolver=le"
      - "traefik.http.services.hapi.loadbalancer.server.port=8080"

  orchestra:
    image: farian/oie-juno:4.10.1.1
    container_name: oie-juno
    platform: linux/amd64
    restart: always

    environment:
      ORCHESTRA_CONTAINER_MODE_ACTIVE: 'true'

      orchestra_settings_database_runtime_db_typ: Derby
      orchestra_settings_database_runtime_url: jdbc:derby:/home/juno/database
      orchestra_settings_database_runtime_user: ${ORCHESTRA_RT_DB_USER}
      orchestra_settings_database_runtime_pwd: ${ORCHESTRA_RT_DB_PASSWORD}


      orchestra_settings_database_archive_db_typ: Derby
      orchestra_settings_database_archive_url: jdbc:derby:/tmp/orchestra/database
      orchestra_settings_database_archive_user: ${ORCHESTRA_AR_DB_USER}
      orchestra_settings_database_archive_pwd: ${ORCHESTRA_AR_DB_PASSWORD}

      orchestra_settings_ExtendedWebApp_servlet_port_http: 8090

    volumes:
      - ./data/orc/logs:/home/juno/logs
      - ./data/orc/autodeployment:/tmp/orchestra/autodeployment
      - ./data/orc/deploypath:/tmp/orchestra/deploypath
      - ./data/orc/localpath:/tmp/orchestra/localpath
      - ./data/orc/longtimearchive:/tmp/orchestra/longtimearchive
      - ./data/orc/licensestore:/home/juno/base/licensestore

    networks:
      - orderentry-orc-net

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=orderentry-orc-net"
      - "traefik.http.routers.orchestra.rule=Host(`${ORCHESTRA_DOMAIN}`)"
      - "traefik.http.routers.orchestra.entrypoints=websecure"
      - "traefik.http.routers.orchestra.tls.certresolver=le"
      - "traefik.http.services.orchestra.loadbalancer.server.port=8090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - orderentry-orc-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=orderentry-orc-net"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./data/prometheus:/etc/prometheus
    networks:
      - orderentry-orc-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=orderentry-orc-net"
      - "traefik.http.routers.prom.rule=Host(`${PROMETHEUS_DOMAIN}`)"
      - "traefik.http.routers.prom.entrypoints=websecure"
      - "traefik.http.routers.prom.tls.certresolver=le"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"
